services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./trading_system.db
      - FMP_API_KEY=${FMP_API_KEY}
      - TS_DATA_ROOT=/app/data
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./ingestion:/app/ingestion
      - ./repository:/app/repository
      - ./backtesting:/app/backtesting
      - ./indicators:/app/indicators
      - ./strategy_lab:/app/strategy_lab
      - ./trading_backtester:/app/trading_backtester
      - ./utils:/app/utils
      - ./portfolio:/app/portfolio
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - INTERNAL_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
