exclude: '(^|/)\\.venv/'

repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    # Use the main branch for pre-commit to avoid pinning to a tag that may not exist
    rev: main
    hooks:
      - id: ruff
        args: ["--fix"]
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        args: ["--line-length", "88"]
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        name: isort (python)
        files: "\\.py$"
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        files: '^(backend|src|strategy|tests|research|ingestion)/.*\\.py$'
        args: ["--ignore-missing-imports", "--exclude", "(^|/)\\.venv/"]
        exclude: '(^|/)\\.venv/'
