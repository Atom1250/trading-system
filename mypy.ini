[mypy]
python_version = 3.9
# Exclude the top-level dataset and backend models/data.py to avoid duplicate
# module name conflicts when mypy maps file paths to module names.
exclude = ^(data/|backend/models/data.py|services/|strategy/)
ignore_missing_imports = True

