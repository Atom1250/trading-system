[mypy]
python_version = 3.10
# Exclude the project's virtualenv and top-level dataset and backend models/data.py
# to avoid duplicate module name conflicts and scanning site-packages that shadow
# stdlib or installed packages.
exclude = ^(\.venv/|venv/|data/|backend/models/data.py|services/|strategy/)
ignore_missing_imports = True

