default_strategy: moving_average_crossover
strategies:
  moving_average_crossover:
    module: strategy.moving_average_crossover
    class: MovingAverageCrossoverStrategy
    params:
      short_window: 20
      long_window: 50
      initial_capital: 100000.0
      risk_per_trade: 0.01
      atr_window: 14
      stop_atr_multiple: 1.5
      take_profit_multiple: 2.0
      max_drawdown_pct: 0.2
  macd_crossover:
    module: strategy.macd_crossover
    class: MACDCrossoverStrategy
    params:
      fast_span: 12
      slow_span: 26
      signal_span: 9
      initial_capital: 100000.0
      risk_per_trade: 0.01
      atr_window: 14
      stop_atr_multiple: 1.5
      take_profit_multiple: 2.0
      max_drawdown_pct: 0.2
  rsi_mean_reversion:
    module: strategy.rsi_mean_reversion
    class: RSIMeanReversionStrategy
    params:
      period: 14
      lower_threshold: 30
      upper_threshold: 70
      initial_capital: 100000.0
      risk_per_trade: 0.01
      atr_window: 14
      stop_atr_multiple: 1.5
      take_profit_multiple: 2.0
      max_drawdown_pct: 0.2
